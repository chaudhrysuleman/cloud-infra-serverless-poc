spring.application.name=cloud-infra-poc

# DB Connection - Configured with environment variables, falls back to local postgres
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AWS Configuration
spring.cloud.aws.region.static=${AWS_REGION:eu-north-1}

# SNS Topic
app.aws.sns.order-events-topic=${SNS_TOPIC_ARN:arn:aws:sns:eu-north-1:000000000000:order-placed-topic}

# S3 Bucket
app.aws.s3.invoice-bucket=${S3_BUCKET:suleman-parcels-invoices}
app.aws.s3.presigned-url-expiration-minutes=15

# Optional overrides for local stack testing
spring.cloud.aws.s3.endpoint=${S3_ENDPOINT:}
spring.cloud.aws.sqs.endpoint=${SQS_ENDPOINT:}
spring.cloud.aws.sns.endpoint=${SNS_ENDPOINT:}
