name: cloud-infra-poc
runtime: yaml
description: AWS Event-Driven Parcels Order System Infrastructure via Pulumi YAML (Serverless version)

variables:
  dbPassword: "SecurePass123!"

resources:
  # ==========================================
  # 1. NETWORKING (VPC, Subnets, Gateway)
  # ==========================================
  vpc:
    type: aws:ec2:Vpc
    properties:
      cidrBlock: 10.0.0.0/16
      enableDnsHostnames: true
      enableDnsSupport: true
      tags:
        Name: poc-custom-vpc

  igw:
    type: aws:ec2:InternetGateway
    properties:
      vpcId: ${vpc.id}
      tags:
        Name: poc-igw

  publicSubnet:
    type: aws:ec2:Subnet
    properties:
      vpcId: ${vpc.id}
      cidrBlock: 10.0.1.0/24
      mapPublicIpOnLaunch: true
      availabilityZone: eu-north-1a
      tags:
        Name: poc-public-subnet

  publicSubnet2:
    type: aws:ec2:Subnet
    properties:
      vpcId: ${vpc.id}
      cidrBlock: 10.0.4.0/24
      mapPublicIpOnLaunch: true
      availabilityZone: eu-north-1b
      tags:
        Name: poc-public-subnet-2

  privateSubnet1:
    type: aws:ec2:Subnet
    properties:
      vpcId: ${vpc.id}
      cidrBlock: 10.0.2.0/24
      availabilityZone: eu-north-1a
      tags:
        Name: poc-private-subnet-1

  privateSubnet2:
    type: aws:ec2:Subnet
    properties:
      vpcId: ${vpc.id}
      cidrBlock: 10.0.3.0/24
      availabilityZone: eu-north-1b
      tags:
        Name: poc-private-subnet-2

  publicRt:
    type: aws:ec2:RouteTable
    properties:
      vpcId: ${vpc.id}
      routes:
        - cidrBlock: 0.0.0.0/0
          gatewayId: ${igw.id}
      tags:
        Name: poc-public-route-table

  publicRtAssoc:
    type: aws:ec2:RouteTableAssociation
    properties:
      subnetId: ${publicSubnet.id}
      routeTableId: ${publicRt.id}

  publicRtAssoc2:
    type: aws:ec2:RouteTableAssociation
    properties:
      subnetId: ${publicSubnet2.id}
      routeTableId: ${publicRt.id}

  privateRt:
    type: aws:ec2:RouteTable
    properties:
      vpcId: ${vpc.id}
      tags:
        Name: poc-private-route-table

  privateRtAssoc1:
    type: aws:ec2:RouteTableAssociation
    properties:
      subnetId: ${privateSubnet1.id}
      routeTableId: ${privateRt.id}

  privateRtAssoc2:
    type: aws:ec2:RouteTableAssociation
    properties:
      subnetId: ${privateSubnet2.id}
      routeTableId: ${privateRt.id}

  # ==========================================
  # 2. SECURITY GROUPS (Firewalls)
  # ==========================================

  # Lambda security group
  lambdaSg:
    type: aws:ec2:SecurityGroup
    properties:
      vpcId: ${vpc.id}
      description: Security group for Lambda functions
      egress:
        - protocol: "-1"
          fromPort: 0
          toPort: 0
          cidrBlocks: ["0.0.0.0/0"]
      tags:
        Name: poc-lambda-security-group

  # RDS security group
  rdsSg:
    type: aws:ec2:SecurityGroup
    properties:
      vpcId: ${vpc.id}
      description: Security group for private PostgreSQL database
      ingress:
        - protocol: tcp
          fromPort: 5432
          toPort: 5432
          securityGroups:
            - ${lambdaSg.id}
          description: Allow connections from Lambda functions only
      egress:
        - protocol: "-1"
          fromPort: 0
          toPort: 0
          cidrBlocks: ["0.0.0.0/0"]
      tags:
        Name: poc-rds-security-group

  # VPC Endpoints security group
  vpcEndpointsSg:
    type: aws:ec2:SecurityGroup
    properties:
      vpcId: ${vpc.id}
      description: Security group for VPC Endpoints
      ingress:
        - protocol: tcp
          fromPort: 443
          toPort: 443
          securityGroups:
            - ${lambdaSg.id}
          description: Allow HTTPS from Lambda functions
      egress:
        - protocol: "-1"
          fromPort: 0
          toPort: 0
          cidrBlocks: ["0.0.0.0/0"]
      tags:
        Name: poc-vpc-endpoints-sg

  # ==========================================
  # 3. VPC ENDPOINTS (Serverless Access)
  # ==========================================
  s3VpcEndpoint:
    type: aws:ec2:VpcEndpoint
    properties:
      vpcId: ${vpc.id}
      serviceName: com.amazonaws.eu-north-1.s3
      vpcEndpointType: Gateway
      routeTableIds:
        - ${privateRt.id}
      tags:
        Name: poc-s3-endpoint

  sqsVpcEndpoint:
    type: aws:ec2:VpcEndpoint
    properties:
      vpcId: ${vpc.id}
      serviceName: com.amazonaws.eu-north-1.sqs
      vpcEndpointType: Interface
      subnetIds:
        - ${privateSubnet1.id}
        - ${privateSubnet2.id}
      securityGroupIds:
        - ${vpcEndpointsSg.id}
      privateDnsEnabled: true
      tags:
        Name: poc-sqs-endpoint

  snsVpcEndpoint:
    type: aws:ec2:VpcEndpoint
    properties:
      vpcId: ${vpc.id}
      serviceName: com.amazonaws.eu-north-1.sns
      vpcEndpointType: Interface
      subnetIds:
        - ${privateSubnet1.id}
        - ${privateSubnet2.id}
      securityGroupIds:
        - ${vpcEndpointsSg.id}
      privateDnsEnabled: true
      tags:
        Name: poc-sns-endpoint

  # ==========================================
  # 4. STORAGE & MESSAGING (S3, SNS, SQS)
  # ==========================================
  invoicesBucket:
    type: aws:s3:BucketV2
    properties:
      bucket: suleman-parcels-invoices-930501832739
      forceDestroy: true
      tags:
        Name: poc-parcels-invoices

  invoicesBucketOwnership:
    type: aws:s3:BucketOwnershipControls
    properties:
      bucket: ${invoicesBucket.id}
      rule:
        objectOwnership: BucketOwnerPreferred

  invoicesBucketPublicBlock:
    type: aws:s3:BucketPublicAccessBlock
    properties:
      bucket: ${invoicesBucket.id}
      blockPublicAcls: true
      blockPublicPolicy: true
      ignorePublicAcls: true
      restrictPublicBuckets: true

  invoicesBucketVersioning:
    type: aws:s3:BucketVersioningV2
    properties:
      bucket: ${invoicesBucket.id}
      versioningConfiguration:
        status: Enabled

  lambdaJar:
    type: aws:s3:BucketObjectv2
    properties:
      bucket: ${invoicesBucket.id}
      key: cloud-infra-poc-lambda.jar
      source:
        fn::fileAsset: ../app/target/cloud-infra-poc-0.0.1-SNAPSHOT.jar

  snsTopic:
    type: aws:sns:Topic
    properties:
      name: order-placed-topic

  notificationQueue:
    type: aws:sqs:Queue
    properties:
      name: notification-queue
      messageRetentionSeconds: 86400

  invoiceQueue:
    type: aws:sqs:Queue
    properties:
      name: invoice-queue
      messageRetentionSeconds: 86400

  deliveryQueue:
    type: aws:sqs:Queue
    properties:
      name: delivery-queue
      messageRetentionSeconds: 86400

  subNotification:
    type: aws:sns:TopicSubscription
    properties:
      topic: ${snsTopic.arn}
      protocol: sqs
      endpoint: ${notificationQueue.arn}

  subInvoice:
    type: aws:sns:TopicSubscription
    properties:
      topic: ${snsTopic.arn}
      protocol: sqs
      endpoint: ${invoiceQueue.arn}

  subDelivery:
    type: aws:sns:TopicSubscription
    properties:
      topic: ${snsTopic.arn}
      protocol: sqs
      endpoint: ${deliveryQueue.arn}

  policyNotification:
    type: aws:sqs:QueuePolicy
    properties:
      queueUrl: ${notificationQueue.id}
      policy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal: "*"
              Action: sqs:SendMessage
              Resource: ${notificationQueue.arn}
              Condition:
                ArnEquals:
                  aws:SourceArn: ${snsTopic.arn}

  policyInvoice:
    type: aws:sqs:QueuePolicy
    properties:
      queueUrl: ${invoiceQueue.id}
      policy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal: "*"
              Action: sqs:SendMessage
              Resource: ${invoiceQueue.arn}
              Condition:
                ArnEquals:
                  aws:SourceArn: ${snsTopic.arn}

  policyDelivery:
    type: aws:sqs:QueuePolicy
    properties:
      queueUrl: ${deliveryQueue.id}
      policy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal: "*"
              Action: sqs:SendMessage
              Resource: ${deliveryQueue.arn}
              Condition:
                ArnEquals:
                  aws:SourceArn: ${snsTopic.arn}

  # ==========================================
  # 5. IAM ROLES (Lambda Service Profile)
  # ==========================================
  lambdaRole:
    type: aws:iam:Role
    properties:
      name: poc-lambda-role
      assumeRolePolicy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Action: sts:AssumeRole
              Effect: Allow
              Principal:
                Service: lambda.amazonaws.com

  lambdaVpcPolicyAttachment:
    type: aws:iam:RolePolicyAttachment
    properties:
      role: ${lambdaRole.name}
      policyArn: arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  lambdaRolePolicy:
    type: aws:iam:RolePolicy
    properties:
      role: ${lambdaRole.id}
      name: poc-lambda-policy
      policy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - "s3:*"
              Resource:
                - ${invoicesBucket.arn}
                - ${invoicesBucket.arn}/*
            - Effect: Allow
              Action:
                - "sns:Publish"
              Resource:
                - ${snsTopic.arn}
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
                - sqs:GetQueueUrl
              Resource:
                - ${notificationQueue.arn}
                - ${invoiceQueue.arn}
                - ${deliveryQueue.arn}

  # ==========================================
  # 6. DATABASES (PostgreSQL RDS)
  # ==========================================
  rdsSubnetGroup:
    type: aws:rds:SubnetGroup
    properties:
      name: poc-rds-subnet-group
      subnetIds:
        - ${privateSubnet1.id}
        - ${privateSubnet2.id}
      tags:
        Name: poc-rds-subnet-group

  postgresDb:
    type: aws:rds:Instance
    properties:
      identifier: poc-postgres-db
      engine: postgres
      engineVersion: "15"
      instanceClass: db.t3.micro
      allocatedStorage: 20
      dbName: postgres
      username: dbadmin
      password: ${dbPassword}
      dbSubnetGroupName: ${rdsSubnetGroup.name}
      vpcSecurityGroupIds:
        - ${rdsSg.id}
      multiAz: false
      skipFinalSnapshot: true
      tags:
        Name: poc-postgres-database

  # ==========================================
  # 7. LAMBDA COMPUTE & API GATEWAY
  # ==========================================
  apiLambda:
    type: aws:lambda:Function
    properties:
      s3Bucket: ${invoicesBucket.id}
      s3Key: ${lambdaJar.key}
      s3ObjectVersion: ${lambdaJar.versionId}
      name: poc-api-lambda
      role: ${lambdaRole.arn}
      handler: com.suleman.poc.StreamLambdaHandler::handleRequest
      runtime: java17
      timeout: 30
      memorySize: 1024
      publish: true
      snapStart:
        applyOn: PublishedVersions
      vpcConfig:
        subnetIds:
          - ${privateSubnet1.id}
          - ${privateSubnet2.id}
        securityGroupIds:
          - ${lambdaSg.id}
      environment:
        variables:
          DB_HOST: ${postgresDb.address}
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: dbadmin
          DB_PASSWORD: ${dbPassword}
          SNS_TOPIC_ARN: ${snsTopic.arn}
          S3_BUCKET: ${invoicesBucket.id}

  sqsLambda:
    type: aws:lambda:Function
    properties:
      s3Bucket: ${invoicesBucket.id}
      s3Key: ${lambdaJar.key}
      s3ObjectVersion: ${lambdaJar.versionId}
      name: poc-sqs-lambda
      role: ${lambdaRole.arn}
      handler: com.suleman.poc.SqsLambdaHandler::handleRequest
      runtime: java17
      timeout: 30
      memorySize: 1024
      publish: true
      snapStart:
        applyOn: PublishedVersions
      vpcConfig:
        subnetIds:
          - ${privateSubnet1.id}
          - ${privateSubnet2.id}
        securityGroupIds:
          - ${lambdaSg.id}
      environment:
        variables:
          DB_HOST: ${postgresDb.address}
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: dbadmin
          DB_PASSWORD: ${dbPassword}
          SNS_TOPIC_ARN: ${snsTopic.arn}
          S3_BUCKET: ${invoicesBucket.id}

  # SQS Trigger mappings
  notificationTrigger:
    type: aws:lambda:EventSourceMapping
    properties:
      eventSourceArn: ${notificationQueue.arn}
      functionName: ${sqsLambda.arn}

  invoiceTrigger:
    type: aws:lambda:EventSourceMapping
    properties:
      eventSourceArn: ${invoiceQueue.arn}
      functionName: ${sqsLambda.arn}

  deliveryTrigger:
    type: aws:lambda:EventSourceMapping
    properties:
      eventSourceArn: ${deliveryQueue.arn}
      functionName: ${sqsLambda.arn}

  # API Gateway HTTP API
  apiGateway:
    type: aws:apigatewayv2:Api
    properties:
      name: poc-api-gateway
      protocolType: HTTP

  apiGatewayIntegration:
    type: aws:apigatewayv2:Integration
    properties:
      apiId: ${apiGateway.id}
      integrationType: AWS_PROXY
      integrationUri: ${apiLambda.qualifiedInvokeArn}
      payloadFormatVersion: "1.0"

  apiGatewayRouteAny:
    type: aws:apigatewayv2:Route
    properties:
      apiId: ${apiGateway.id}
      routeKey: "ANY /{proxy+}"
      target: integrations/${apiGatewayIntegration.id}

  apiGatewayRouteRoot:
    type: aws:apigatewayv2:Route
    properties:
      apiId: ${apiGateway.id}
      routeKey: "ANY /"
      target: integrations/${apiGatewayIntegration.id}

  apiGatewayStage:
    type: aws:apigatewayv2:Stage
    properties:
      apiId: ${apiGateway.id}
      name: $default
      autoDeploy: true

  lambdaPermission:
    type: aws:lambda:Permission
    properties:
      action: lambda:InvokeFunction
      function: ${apiLambda.name}
      principal: apigateway.amazonaws.com
      sourceArn: ${apiGateway.executionArn}/*/*

  lambdaPermissionQualified:
    type: aws:lambda:Permission
    properties:
      action: lambda:InvokeFunction
      function: ${apiLambda.qualifiedArn}
      principal: apigateway.amazonaws.com
      sourceArn: ${apiGateway.executionArn}/*/*

outputs:
  api_gateway_url: ${apiGatewayStage.invokeUrl}
  rds_endpoint: ${postgresDb.endpoint}
